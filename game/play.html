<!DOCTYPE html>
<html lang="en-US">
<meta charset="utf-8">
<title>TLW:JP Board Game</title>
<link rel="stylesheet" href="lib/jquery.svg.css">
<link rel="stylesheet" href="general.css">
<link rel="stylesheet" href="board-and-pieces.css">
<link rel="stylesheet" href="ui.css">
<link rel="stylesheet" href="gameplay-menu.css">
<link rel="stylesheet" href="dice.css">
<link rel="stylesheet" href="z-indices.css">
<link rel="stylesheet" href="display.css">
<link rel="icon" type="image/png" sizes="64x64"
  href="img/icon/icon-64.png">
<div id="gameplay-container" class="full-board">
  <div id="raptor-map" class="full-board"></div>
  <div id="raptor-point-labels"
    class="full-board debug-labels">
  </div>
  <div id="raptor-space-labels"
    class="full-board debug-labels">
  </div>
  <div id="buildings-map" class="full-board"></div>
  <div id="human-edges" class="full-board"></div>
  <div id="human-space-labels"
    class="full-board debug-labels">
  </div>
  <div id="trex-edges" class="full-board"></div>
  <div id="gameplay-menu" class="non-zoom"></div>
  <div id="message-container"
    class="flex-container info non-zoom dormant">
    <span class="content"></span>
    <div class="hider flex-container dormant">
      <span>Hide Message</span>
    </div>
  </div>
  <div id="game-over"
    class="info non-zoom centered dormant">
  </div>
  <button type="button" id="toggle-audio"
    class="small-button non-zoom">
  </button>
</div>
<div id="title-container" class="full-screen">
  <div id="title-content" class="flex-container">
  </div>
</div>
<div id="start-container" class="full-screen">
  <div id="start-options" class="flex-container">
    <button type="button" id="start-new">
      Start New Game
    </button>
    <button type="button" id="load-saved">
      Load Saved Game
    </button>
    <button type="button" id="start-toggle-audio">
      Toggle Audio
    </button>
  </div>
  <div id="start-message"
    class="info centered dormant">
  </div>
  <div id="load-choose-save"
    class="flex-container dormant">
    <button type="button" id="load-overwrite">
      Use Same File (Overwrite)
    </button>
    <button type="button" id="load-new">
      Create New File
    </button>
  </div>
</div>
<div id="player-control"
  class="full-screen flex-container tight dormant">
  <div class="flex-container row tight"></div>
  <button type="button" id="continue-from-control">
    Continue
  </button>
</div>
<div id="more-menu"
  class="full-screen non-zoom dormant">
  <div id="more-options"
    class="flex-container dormant">
    <button type="button" id="hide-more">
      Return to Game
    </button>
    <button type="button" id="new-save-point">
      Create New Save Point
    </button>
    <button type="button" id="begin-edit">
      Edit (Cheat)
    </button>
    <button type="button" id="change-player-control">
      Change Player Control
    </button>
    <button type="button" id="show-quit-options">
      Quit Game
    </button>
  </div>
  <div id="manual-save-help"
    class="flex-container dormant">
  </div>
  <div id="quit-options"
    class="flex-container dormant">
    <button type="button" id="abort-quit">
      Return to Game
    </button>
    <button type="button" id="confirm-quit">
      Quit Game
    </button>
  </div>
</div>
<div class="display-matte top"></div>
<div class="display-matte bottom"></div>
<div class="display-matte left"></div>
<div class="display-matte right"></div>
<script src="lib/jquery-3.6.0.min.js"></script>
<script src="lib/jquery-ui-bounce.min.js"></script>
<script src="lib/jquery.svg.min.js"></script>
<script src="lib/jquery.svgdom.min.js"></script>
<script src="lib/seedrandom.min.js"></script>
<script type="module" src="main.js"></script>
</html>
